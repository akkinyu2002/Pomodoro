<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-labelledby="title">
  <title id="title">Focus Forge icon (192)</title>
  <defs>
    <radialGradient id="g1" cx="30%" cy="25%" r="120%">
      <stop offset="0%" stop-color="#2a3036"/>
      <stop offset="100%" stop-color="#0f1618"/>
    </radialGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd37a"/>
      <stop offset="100%" stop-color="#ff9a56"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="192" height="192" rx="28" fill="url(#g1)" />

  <!-- outer ring -->
  <g transform="translate(96,96)">
    <circle r="70" fill="none" stroke="#21363b" stroke-width="8" />
    <circle r="60" fill="url(#g2)" filter="url(#shadow)" opacity="0.16" />

    <!-- clock face -->
    <circle r="52" fill="#0f1719" stroke="#2a3a3d" stroke-width="4" />

    <!-- minute hand -->
    <g transform="rotate(-30)">
      <rect x="-4" y="-6" width="8" height="44" rx="4" fill="#f5f7f9" opacity="0.94"/>
    </g>

    <!-- hour hand -->
    <g transform="rotate(20)">
      <rect x="-5" y="-4" width="10" height="32" rx="5" fill="#ffd37a"/>
    </g>

    <!-- center cap -->
    <circle r="6" fill="#06100d" stroke="#ffd37a" stroke-width="2" />
  </g>

  <!-- subtle forge bar -->
  <rect x="22" y="146" width="148" height="10" rx="5" fill="#ffbf47" opacity="0.92" />

</svg>
