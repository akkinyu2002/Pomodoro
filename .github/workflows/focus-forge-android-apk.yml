name: Build Focus Forge Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'focus-forge-mobile/**'
      - '.github/workflows/focus-forge-android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: focus-forge-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Capacitor dependencies
        run: npm install

      - name: Sync web app into mobile wrapper
        run: npm run sync:web

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: focus-forge-android-apk
          path: focus-forge-mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create or update GitHub release and attach APK
        uses: ncipollo/release-action@v1
        with:
          tag: focus-forge-apk-${{ github.run_id }}
          name: Focus Forge Android APK ${{ github.run_id }}
          body: "Automated debug APK from workflow run ${{ github.run_id }}"
          files: focus-forge-mobile/android/app/build/outputs/apk/debug/app-debug.apk
